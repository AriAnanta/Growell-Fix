version: '3.8'

services:
  # ================================
  # MySQL Database
  # ================================
  db:
    image: mysql:8.0
    container_name: growell-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: growell_root_2024
      MYSQL_DATABASE: growell_db
      MYSQL_USER: growell_user
      MYSQL_PASSWORD: growell_password_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - growell-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ================================
  # ML Service (FastAPI + Python)
  # ================================
  ml:
    build:
      context: ./ml_baru
      dockerfile: Dockerfile
    container_name: growell-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_KEY=growell123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - growell-network

  # ================================
  # phpMyAdmin
  # ================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: growell-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=growell_root_2024
    depends_on:
      db:
        condition: service_healthy
    networks:
      - growell-network

  # ================================
  # Next.js App (Frontend + Backend API)
  # ================================
  app:
    build:
      context: ./Growell
      dockerfile: Dockerfile
    container_name: growell-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=growell_user
      - DB_PASSWORD=growell_password_2024
      - DB_NAME=growell_db
      - JWT_SECRET=growell_jwt_secret_key_2024_very_secure
      - JWT_EXPIRES_IN=7d
      - ML_SERVICE_URL=http://ml:8000
      - ML_API_KEY=growell123
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_ML_SERVICE_URL=http://localhost:8000
      - UPLOAD_DIR=./uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads
    networks:
      - growell-network

volumes:
  mysql_data:
    driver: local
  app_uploads:
    driver: local

networks:
  growell-network:
    driver: bridge
